<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusFit – Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<body class="auth-page">
  <div class="auth-card">
    <div class="logo">FocusFit</div>
    <div class="tagline">Your smart wellness and productivity companion</div>
     <button type="button" class="auth-theme-btn" onclick="toggleAuthTheme()" id="auth-theme-btn">
  🌙 Dark
</button>
    <h2>Welcome back</h2>

    {% if error %}
      <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required />
      </div>

      <button type="submit" class="btn-primary">Log In</button>
    </form>

    <div class="auth-link">
      Don't have an account? <a href="/signup">Sign up</a>
    </div>
  </div>
<script>
  function applyAuthTheme() {
    const savedTheme = localStorage.getItem("focusfit-theme");
    const btn = document.getElementById("auth-theme-btn");

    if (savedTheme === "dark") {
      document.body.classList.add("dark-mode");
      if (btn) btn.textContent = "☀️ Light";
    } else {
      document.body.classList.remove("dark-mode");
      if (btn) btn.textContent = "🌙 Dark";
    }
  }

  function toggleAuthTheme() {
    const isDark = document.body.classList.toggle("dark-mode");
    localStorage.setItem("focusfit-theme", isDark ? "dark" : "light");
    applyAuthTheme();
  }

  document.addEventListener("DOMContentLoaded", applyAuthTheme);
</script>
</body>
</html>
